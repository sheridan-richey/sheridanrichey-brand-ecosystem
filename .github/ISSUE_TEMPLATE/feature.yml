name: Feature
description: New functionality or improvement
title: "[feature] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        See [AGENTS.md](https://github.com/sheridan-richey/sheridanrichey-brand-ecosystem/blob/main/AGENTS.md) and `.cursor/rules/` for standards.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should happen and why?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:website
        - area:docs
        - area:seo
        - area:content
        - area:other
    validations:
      required: true
