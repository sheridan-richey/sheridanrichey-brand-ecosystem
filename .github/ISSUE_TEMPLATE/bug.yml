name: Bug
description: Something is broken or incorrect
title: "[bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ..."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment (browser, URL, branch)
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:website
        - area:docs
        - area:content
        - area:other
    validations:
      required: true
